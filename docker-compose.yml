name: pam

services:
  postgres:
    image: postgres:17
    container_name: pam-postgres
    environment:
      POSTGRES_USER: pam
      POSTGRES_PASSWORD: pam_dev_password
      POSTGRES_DB: pam
    ports:
      - "5432:5432"
    volumes:
      - pam-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pam -d pam"]
      interval: 5s
      timeout: 5s
      retries: 10

  zitadel-postgres:
    image: postgres:17
    container_name: pam-zitadel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    ports:
      - "5433:5432"
    volumes:
      - pam-zitadel-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: pam-zitadel
    restart: on-failure
    command: 'start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled'
    environment:
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: zitadel-admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Password1!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap SA
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/zitadel-admin-sa.pat
    ports:
      - "8080:8080"
    volumes:
      # Bind mount (not a named volume) so the host has direct read access to
      # the PAT file written on first init. The host dir is pre-created with
      # world-writable perms by `make up` because Docker named volumes default
      # to root-owned and the ZITADEL container process runs as a non-root
      # user.
      - ./infra/zitadel/machinekey:/machinekey
    depends_on:
      zitadel-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/zitadel.yaml"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pam-redis
    command: ["redis-server", "--requirepass", "redis_dev_password"]
    ports:
      - "6379:6379"
    volumes:
      - pam-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: pam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pam
      RABBITMQ_DEFAULT_PASS: rabbit_dev_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pam-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  seq:
    image: datalust/seq:latest
    container_name: pam-seq
    environment:
      ACCEPT_EULA: "Y"
      # Dev only: skip the admin-password setup wizard. In any non-dev
      # deployment, set SEQ_FIRSTRUN_ADMINPASSWORD instead.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8090:80"
    volumes:
      - pam-seq:/data

volumes:
  pam-postgres:
  pam-zitadel-postgres:
  pam-redis:
  pam-rabbitmq:
  pam-seq:
