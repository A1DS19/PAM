name: pam

services:
  # SQL Server 2022. platform: linux/amd64 is required for Apple Silicon
  # hosts — Microsoft has not yet shipped an ARM64-native Linux image for
  # SQL Server. Rosetta emulation is reasonable for dev workload; CI on
  # amd64 runners is unaffected. QA + production run native amd64.
  #
  # Connection string uses the `sa` account because dev only — production
  # provisions a least-privileged login per environment via IT scripts.
  # The password meets SQL Server's complexity rules (>=8 chars,
  # uppercase + lowercase + digit + special) which is non-negotiable on
  # the SA account.
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: pam-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pam_dev_password_123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - pam-mssql:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pam_dev_password_123!' -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Pam_dev_password_123!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pam-redis
    command: ["redis-server", "--requirepass", "redis_dev_password"]
    ports:
      - "6379:6379"
    volumes:
      - pam-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: pam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pam
      RABBITMQ_DEFAULT_PASS: rabbit_dev_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pam-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    # SMTP sink for dev. The API sends to :1025; messages land in the web
    # UI at http://localhost:8025. Production uses a real SMTP/SES backend
    # — swap Smtp:Host in config to migrate.
    image: axllent/mailpit:latest
    container_name: pam-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  seq:
    image: datalust/seq:latest
    container_name: pam-seq
    environment:
      ACCEPT_EULA: "Y"
      # Dev only: skip the admin-password setup wizard. In any non-dev
      # deployment, set SEQ_FIRSTRUN_ADMINPASSWORD instead.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8090:80"
    volumes:
      - pam-seq:/data

  # All-in-one Grafana LGTM stack (Loki + Grafana + Tempo + Mimir +
  # OpenTelemetry Collector). The single image is significantly less
  # ops than running each piece separately and is the upstream-supported
  # path for local OTel exploration.
  #
  # Receives OTLP traces/metrics/logs from Pam.Api on :4317 (gRPC) and
  # :4318 (HTTP). Grafana UI on :3001 (3000 is the SPA's port).
  #
  # Production replaces this with the real backend (Grafana Cloud, a
  # self-hosted LGTM split out, Honeycomb, Datadog, …) — the API just
  # changes the OTLP endpoint via OTEL_EXPORTER_OTLP_ENDPOINT.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: pam-otel-lgtm
    ports:
      - "3001:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - pam-otel-lgtm:/data

  # Docusaurus dev server. Hot-reload via bind mount.
  # node_modules, .docusaurus/ and build/ are anonymous volumes so the
  # container's regenerated artifacts never collide with the host's
  # (paths inside .docusaurus/ are absolute and would otherwise leak
  # the host's /home/.../docs-site path into the container's webpack).
  # Available at http://localhost:4000 (host) — 3000 is reserved for the SPA.
  docs-site:
    image: node:22-alpine
    container_name: pam-docs
    working_dir: /docs-site
    command: sh -c "npm install --no-audit --no-fund && npx docusaurus start --host 0.0.0.0 --port 3000"
    volumes:
      - ./docs-site:/docs-site
      - pam-docs-node-modules:/docs-site/node_modules
      - pam-docs-cache:/docs-site/.docusaurus
      - pam-docs-build:/docs-site/build
    ports:
      - "4000:3000"

volumes:
  pam-mssql:
  pam-redis:
  pam-rabbitmq:
  pam-seq:
  pam-otel-lgtm:
  pam-docs-node-modules:
  pam-docs-cache:
  pam-docs-build:
