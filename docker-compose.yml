name: pam

services:
  postgres:
    image: postgres:17
    container_name: pam-postgres
    environment:
      POSTGRES_USER: pam
      POSTGRES_PASSWORD: pam_dev_password
      POSTGRES_DB: pam
    ports:
      - "5432:5432"
    volumes:
      - pam-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pam -d pam"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pam-redis
    command: ["redis-server", "--requirepass", "redis_dev_password"]
    ports:
      - "6379:6379"
    volumes:
      - pam-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: pam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pam
      RABBITMQ_DEFAULT_PASS: rabbit_dev_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pam-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  seq:
    image: datalust/seq:latest
    container_name: pam-seq
    environment:
      ACCEPT_EULA: "Y"
      # Dev only: skip the admin-password setup wizard. In any non-dev
      # deployment, set SEQ_FIRSTRUN_ADMINPASSWORD instead.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8090:80"
    volumes:
      - pam-seq:/data

volumes:
  pam-postgres:
  pam-redis:
  pam-rabbitmq:
  pam-seq:
